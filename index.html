<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <h1>Task Tracker</h1>
        <p>Manage your daily tasks efficiently.</p>
    </header>

    <!-- Main Content -->
    <main>

        <!-- Task Form -->
        <section class="task-form-section">

            <h2>Add New Task</h2>

            <form id="task-form">

                <div class="form-group">
                    <label for="task-name">Task Name</label>
                    <input type="text" id="task-name" placeholder="Enter task name" required>
                </div>

                <div class="form-group">
                    <label for="priority">Priority</label>

                    <select id="priority" required>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="due-date">Due Date</label>

                    <input type="date" id="due-date" required>
                </div>

                <button type="submit">
                    Add Task
                </button>

            </form>

        </section>

        <!-- Filter and Sort -->
        <section class="controls">

            <h2>Task Controls</h2>

            <div class="filter-buttons">

                <button id="filter-all" type="button">
                    All
                </button>

                <button id="filter-pending" type="button">
                    Pending
                </button>

                <button id="filter-done" type="button">
                    Done
                </button>

            </div>

            <div class="sort-section">

                <label for="sort-select">
                    Sort By
                </label>

                <select id="sort-select">

                    <option value="">
                        Select
                    </option>

                    <option value="priority">
                        By Priority
                    </option>

                    <option value="dueDate">
                        By Due Date
                    </option>

                </select>

            </div>

        </section>

        <!-- Counter -->
        <section>

            <p id="task-counter">
                Showing 0 of 0 tasks
            </p>

        </section>

        <!-- Task List -->
        <section>

            <h2>Your Tasks</h2>

            <ul id="task-list">

                <!-- Tasks will be added dynamically -->

            </ul>

            <button id="clear-all" type="button">
                Clear All
            </button>

        </section>

        <!-- Summary Table -->
        <section>

            <h2>Task Summary</h2>

            <table>

                <thead>

                    <tr>

                        <th>Task</th>
                        <th>Priority</th>
                        <th>Due Date</th>
                        <th>Status</th>

                    </tr>

                </thead>

                <tbody id="summary-body">

                    <!-- JavaScript will populate this table -->

                </tbody>

            </table>

        </section>

    </main>

    <!-- Footer -->
    <footer>

        <p>
            © 2026 Task Tracker | Developed by Josemafita
        </p>

    </footer>

    <script src="main.js"></script>

</body>

</html>
