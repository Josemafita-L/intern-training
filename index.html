<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Task Tracker</h1>
        <p>Manage your daily tasks efficiently.</p>
    </header>

    <main>

        <section>

            <h2>Add New Task</h2>

            <form id="task-form">

                <div class="form-group">

                    <label for="task-name">Task Name</label>

                    <input type="text" id="task-name" placeholder="Enter task name" required>

                </div>

                <div class="form-group">

                    <label for="priority">Priority</label>

                    <select id="priority" required>

                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>

                    </select>

                </div>

                <div class="form-group">

                    <label for="due-date">Due Date</label>

                    <input type="date" id="due-date" required>

                </div>

                <button type="submit">
                    Add Task
                </button>

            </form>

        </section>

        <section>

            <h2>Task Controls</h2>

            <div class="filter-buttons">

                <button id="filter-all" type="button">
                    All
                </button>

                <button id="filter-pending" type="button">
                    Pending
                </button>

                <button id="filter-done" type="button">
                    Done
                </button>

            </div>

            <br>

            <label for="sort-by">
                Sort By
            </label>

            <select id="sort-by">

                <option value="">
                    Select
                </option>

                <option value="priority">
                    By Priority
                </option>

                <option value="dueDate">
                    By Due Date
                </option>

            </select>

            <br><br>

            <p id="task-counter">
                Showing 0 of 0 tasks
            </p>

        </section>

        <section>

            <h2>Task List</h2>

            <ul id="task-list">

            </ul>

            <br>

            <button id="clear-all" type="button">
                Clear All
            </button>

        </section>

        <section>

            <h2>Task Summary</h2>

            <table>

                <thead>

                    <tr>

                        <th>Priority</th>
                        <th>Count</th>

                    </tr>

                </thead>

                <tbody id="summary-body">

                </tbody>

            </table>

        </section>

    </main>

    <footer>

        <p>
            © 2026 Task Tracker | Developed by Josemafita
        </p>

    </footer>

    <script type="module" src="main.js"></script>

</body>

</html>
